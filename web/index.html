<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="БРАТАН-музончик — минималистичный музыкальный плеер" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="БРАТАН" />
    <link rel="icon" type="image/svg+xml" href="/BRATAN-muzonchik/favicon.svg" />
    <link rel="apple-touch-icon" href="/BRATAN-muzonchik/icon.svg" />
    <title>БРАТАН-музончик</title>
    <script>
      // DESIGN.md specifies a dark-only surface. Force the attribute so any
      // previously persisted `light` preference is reset on load.
      document.documentElement.setAttribute('data-theme', 'dark');
      try { localStorage.setItem('bratan.theme', 'dark'); } catch (e) { /* ignore */ }
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
